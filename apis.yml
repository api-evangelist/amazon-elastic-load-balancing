- name: Classic Load Balancing API
  description: >-
    API for managing Classic Load Balancers, which provide basic load
    balancing across multiple Amazon EC2 instances at the request level
    and the connection level. Classic Load Balancers are intended for
    applications built within the EC2-Classic network.
