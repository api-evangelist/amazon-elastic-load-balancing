name: Amazon Elastic Load Balancing
description: Amazon Elastic Load Balancing automatically distributes incoming application traffic across multiple targets, such as Amazon EC2 instances, containers, IP addresses, and Lambda functions,
  ensuring high availability and fault tolerance for your applications.
