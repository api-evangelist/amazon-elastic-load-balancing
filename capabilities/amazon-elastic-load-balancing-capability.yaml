naftiko: 1.0.0-alpha2
info:
  label: Amazon Elastic Load Balancing v2 API
  description: Amazon Elastic Load Balancing automatically distributes incoming application traffic across multiple targets,
    such as Amazon EC2 instances, containers, IP addresses, and Lambda functions. It supports Application Load Balancers,
    Network Load Balancers, and Gateway Load Balancers.
  tags:
  - Amazon
  - Elastic
  - Load
  - Balancing
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: amazon-elastic-load-balancing
    baseUri: https://elasticloadbalancing.us-east-1.amazonaws.com
    description: Amazon Elastic Load Balancing v2 API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{AMAZON_ELASTIC_LOAD_BALANCING_TOKEN}}'
